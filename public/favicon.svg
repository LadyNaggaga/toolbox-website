<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="24" fill="#14B8A6"/>
  
  <!-- Connecting lines -->
  <line x1="25" y1="25" x2="75" y2="25" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="75" y1="25" x2="75" y2="75" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="75" y1="75" x2="25" y2="75" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="25" y1="75" x2="25" y2="25" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Corner dots -->
  <circle cx="25" cy="25" r="12" fill="white"/>
  <circle cx="75" cy="25" r="12" fill="white"/>
  <circle cx="25" cy="75" r="12" fill="white"/>
  <circle cx="75" cy="75" r="12" fill="white"/>
</svg>
